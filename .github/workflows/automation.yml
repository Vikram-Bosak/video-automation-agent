name: 🎬 Google Vids Automation

on:
  schedule:
    # Har 4 ghante — 6 videos per day
    - cron: '0 0,4,8,12,16,20 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-video:
    name: 🎬 Generate Video (Google Vids + Veo 3.1)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Install Playwright
        run: playwright install chromium --with-deps

      - name: 🖥️ Install Xvfb (virtual display)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: 📁 Create Directories
        run: mkdir -p downloads logs

      - name: 💾 Restore State
        uses: actions/cache@v4
        with:
          path: state.json
          key: pipeline-state-${{ github.ref_name }}
          restore-keys: pipeline-state-

      - name: 🍪 Inject Cookies
        run: |
          if [ -n "${{ secrets.GOOGLE_COOKIES }}" ]; then
            echo "${{ secrets.GOOGLE_COOKIES }}" | base64 -d > cookies.json
            echo "✅ Cookies injected"
          else
            echo "⚠️  No cookies — manual login needed"
          fi

      - name: 🔍 Pre-flight Check
        run: |
          echo "=== PRE-FLIGHT ==="
          echo "GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS && 'SET' || 'NOT SET' }}"
          echo "SHEET_ID: ${{ secrets.SHEET_ID && 'SET' || 'NOT SET' }}"
          echo "DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID && 'SET' || 'NOT SET' }}"
          echo "GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES && 'SET' || 'NOT SET' }}"
          python -c "
          import sys; sys.path.insert(0, '.')
          try:
              from config.settings import validate_config
              errors = validate_config()
              if errors:
                  for e in errors: print(f'  - {e}')
              else:
                  print('✅ Config OK')
          except Exception as e:
              print(f'❌ {e}')
          "

      - name: 🚀 Run Pipeline
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID:           ${{ secrets.SHEET_ID }}
          SHEET_NAME:         ${{ secrets.SHEET_NAME }}
          DRIVE_FOLDER_ID:    ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_PROJECT_ID:  ${{ secrets.GOOGLE_PROJECT_ID }}
          LOG_LEVEL:          'INFO'
          BROWSER_HEADLESS:   'false'
        run: |
          # Run with Xvfb (virtual display) — looks like real user, cookies last 2-4 weeks
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python tools/dry_run.py
          else
            xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python main.py
          fi

      - name: 💾 Save State
        if: always()
        uses: actions/cache@v4
        with:
          path: state.json
          key: pipeline-state-${{ github.ref_name }}-${{ github.run_number }}

      - name: 📸 Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: logs/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 📋 Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 🎬 Google Vids Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Method | Google Vids (Veo 3.1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Cost | FREE (Google account) |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u) |" >> $GITHUB_STEP_SUMMARY
